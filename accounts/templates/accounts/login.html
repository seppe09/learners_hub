{% extends 'layout.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<h1 class="auth-heading">Welcome back</h1>
<div class="form-container">
  <form method="post" novalidate>
    {% csrf_token %}
    <fieldset>
      <div>
        <label for="login_input">Username or Email</label>
        <input type="text" name="login_input" id="login_input"
          placeholder="you@example.com" autocomplete="username" autofocus>
      </div>

      <div>
        <label for="password">Password</label>
        <input type="password" name="password" id="password"
          placeholder="••••••••" autocomplete="current-password">
      </div>

      <button type="submit">Sign In →</button>
    </fieldset>
  </form>

  <div class="auth-footer">
    Don't have an account? <a href="{% url 'signup_page' %}">Create one</a>
  </div>
</div>
{% endblock %}

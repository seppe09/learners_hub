{% extends 'layout.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<h1 class="auth-heading">Login</h1>
<div class="form-container">
    <form method="post">
        {% csrf_token %}
        <fieldset>

            <label for="login_input">Username or Email</label>
            <input type="text" name="login_input" id="login_input" placeholder="Enter your username or email">

            <label for="password1">Password</label>
            <input type="password" name="password" id="password" placeholder="Enter your password">

            <button type="submit" style="margin-top: 20px; padding: 10px; cursor: pointer;">Login</button>

        </fieldset>
    </form>
</div>
{% endblock %}

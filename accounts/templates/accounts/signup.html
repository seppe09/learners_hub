{% extends 'layout.html' %}

{% block title %}SignUp Page{% endblock %}

{% block content %}
<h1 class="auth-heading">SignUp</h1>
<div class="form-container">
    <form method="post">
        {% csrf_token %}
        <fieldset>

            <div class="role-selection">
                <label><input type="radio" name="role" value="teacher"> Teacher</label>
                <label><input type="radio" name="role" value="student" checked> Student</label>
            </div>

            <label for="first_name">First Name</label>
            <input type="text" name="first_name" id="first_name" placeholder="Enter your first name">

            <label for="last_name">Last Name</label>
            <input type="text" name="last_name" id="last_name" placeholder="Enter your last name">

            <label for="username">Username</label>
            <input type="text" name="username" id="username" placeholder="Enter your username">

            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="example@mail.com">

            <label for="password1">Password</label>
            <input type="password" name="password1" id="password1" placeholder="Enter your password">

            <label for="password2">Confirm Password</label>
            <input type="password" name="password2" id="password2" placeholder="Enter your password again">

            <button type="submit" style="margin-top: 20px; padding: 10px; cursor: pointer;">Register</button>

        </fieldset>
    </form>
</div>
{% endblock %}

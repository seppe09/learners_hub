{% extends 'layout.html' %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<h1 class="auth-heading">Create account</h1>
<div class="form-container" style="max-width:520px;">
  <form method="post" novalidate>
    {% csrf_token %}
    <fieldset>

      <div>
        <label>I am a...</label>
        <div class="role-selection">
          <input type="radio" name="role" id="role-student" value="student"
            {% if not form_data or form_data.role != 'teacher' %}checked{% endif %}>
          <label for="role-student">🎓 Student</label>
          <input type="radio" name="role" id="role-teacher" value="teacher"
            {% if form_data.role == 'teacher' %}checked{% endif %}>
          <label for="role-teacher">📚 Teacher</label>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
        <div>
          <label for="first_name">First Name</label>
          <input type="text" name="first_name" id="first_name" placeholder="Jane"
            value="{{ form_data.first_name|default:'' }}">
        </div>
        <div>
          <label for="last_name">Last Name</label>
          <input type="text" name="last_name" id="last_name" placeholder="Doe"
            value="{{ form_data.last_name|default:'' }}">
        </div>
      </div>

      <div>
        <label for="username">Username</label>
        <input type="text" name="username" id="username" placeholder="janedoe"
          autocomplete="username" value="{{ form_data.username|default:'' }}">
      </div>

      <div>
        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="jane@example.com"
          autocomplete="email" value="{{ form_data.email|default:'' }}">
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
        <div>
          <label for="password1">Password</label>
          <input type="password" name="password1" id="password1"
            placeholder="Min 8 characters" autocomplete="new-password">
        </div>
        <div>
          <label for="password2">Confirm</label>
          <input type="password" name="password2" id="password2"
            placeholder="Repeat password" autocomplete="new-password">
        </div>
      </div>

      <button type="submit">Create Account →</button>
    </fieldset>
  </form>

  <div class="auth-footer">
    Already have an account? <a href="{% url 'login_page' %}">Sign in</a>
  </div>
</div>
{% endblock %}

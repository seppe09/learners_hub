<div>
  <label for="qualification">Qualification</label>
  <select name="qualification" id="qualification">
    <option value="bachelors">Bachelors</option>
    <option value="masters">Masters</option>
    <option value="phd">PhD</option>
  </select>
</div>

<div>
  <label for="expertise">Expertise</label>
  <input type="text" name="expertise" id="expertise" placeholder="e.g. Mathematics, Physics">
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
  <div>
    <label for="experience">Experience (years)</label>
    <input type="number" name="experience" id="experience" placeholder="5" min="0">
  </div>
  <div>
    <label for="languages">Languages</label>
    <input type="text" name="languages" id="languages" placeholder="e.g. English, Hindi">
  </div>
</div>
